<!DOCTYPE html>
<html>
<head>
  <title>MarketEdge Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    .gradient-title {
      font-size: 26px;
      font-weight: bold;
      background: linear-gradient(90deg, #22c55e, #38bdf8, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .box {
      background: linear-gradient(145deg, #1e293b, #0f172a);
      border: 1px solid #334155;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="gradient-title">MarketEdge Dashboard</div>

<div class="box">
  <h3>Market Bias</h3>
  <div id="bias">Loading...</div>
</div>

<div class="box">
  <h3>NFP</h3>
  <div id="nfp">Loading...</div>
</div>

<div class="box">
  <h3>CPI</h3>
  <div id="cpi">Loading...</div>
</div>

<div class="box">
  <h3>XAUUSD Impact</h3>
  <div id="gold">Loading...</div>
</div>

<script>
function run() {

  let nfp = 6;
  let cpi = 4;

  let total = nfp + cpi;

  let bias = "NEUTRAL";

  if (total >= 10) bias = "USD STRONG BULLISH";
  else if (total >= 7) bias = "MODERATE BULLISH";
  else if (total >= 4) bias = "NEUTRAL";
  else bias = "USD WEAK";

  document.getElementById("nfp").innerText = "Score: " + nfp;
  document.getElementById("cpi").innerText = "Score: " + cpi;
  document.getElementById("bias").innerText = bias;

  document.getElementById("gold").innerText =
    bias.includes("BULLISH")
      ? "XAUUSD DOWN 🔻"
      : "XAUUSD UP 🔺";
}

run();
</script>

</body>
</html>
