<body>

<div class="title">MarketEdge Dashboard</div>

<div class="box">
  <h3>Market Bias Engine</h3>
  <div id="bias" class="signal">CALCULATING...</div>
</div>

<div class="box">
  <h3>NFP Score</h3>
  <div id="nfp">Loading...</div>
</div>

<div class="box">
  <h3>CPI Score</h3>
  <div id="cpi">Loading...</div>
</div>

<div class="box">
  <h3>XAUUSD Impact</h3>
  <div id="gold">Analyzing...</div>
</div>

<script>
  // SIMPLE MARKETEDGE ENGINE (V1)

  let nfpScore = 6;   // fake baseline (we improve later)
  let cpiScore = 4;

  let total = nfpScore + cpiScore;

  let bias = "NEUTRAL";

  if (total >= 10) bias = "STRONG USD BULLISH";
  else if (total >= 7) bias = "MODERATE USD BULLISH";
  else if (total >= 4) bias = "NEUTRAL";
  else bias = "USD WEAK";

  document.getElementById("nfp").innerText = "Score: " + nfpScore;
  document.getElementById("cpi").innerText = "Score: " + cpiScore;
  document.getElementById("bias").innerText = bias;

  if (bias.includes("BULLISH")) {
    document.getElementById("gold").innerText = "XAUUSD likely DOWN 🔻";
  } else if (bias.includes("WEAK")) {
    document.getElementById("gold").innerText = "XAUUSD likely UP 🔺";
  } else {
    document.getElementById("gold").innerText = "NO CLEAR DIRECTION";
  }
</script>

</body>
