<script>
async function fetchMarketData() {

  // STRUCTURED REAL-WORLD FORMAT (we plug APIs later)
  return {
    nfp: {
      value: 175000,
      strength: "STRONG" // STRONG / WEAK / NEUTRAL
    },
    cpi: {
      value: 3.1,
      strength: "DISINFLATION"
    }
  };
}

function getColor(strength) {
  if (strength === "STRONG") return "#22c55e"; // green
  if (strength === "WEAK") return "#ef4444";   // red
  return "#f59e0b"; // amber
}

function getBias(nfp, cpi) {

  let score = 0;

  if (nfp.strength === "STRONG") score += 1;
  if (cpi.strength === "DISINFLATION") score += 1;

  if (score >= 2) return "USD STRONG BULLISH";
  if (score === 1) return "MIXED SIGNALS";
  return "USD WEAK / RISK OFF";
}

async function run() {

  const data = await fetchMarketData();

  const bias = getBias(data.nfp, data.cpi);

  // NFP UI
  document.getElementById("nfp").innerHTML =
    `<span style="color:${getColor(data.nfp.strength)}">
      NFP: ${data.nfp.value} (${data.nfp.strength})
    </span>`;

  // CPI UI
  document.getElementById("cpi").innerHTML =
    `<span style="color:${getColor(data.cpi.strength)}">
      CPI: ${data.cpi.value}% (${data.cpi.strength})
    </span>`;

  // BIAS UI
  document.getElementById("bias").innerHTML =
    `<span style="color:#38bdf8; font-weight:bold">
      ${bias}
    </span>`;

  // GOLD IMPACT LOGIC
  document.getElementById("gold").innerHTML =
    bias.includes("BULLISH")
      ? `<span style="color:#ef4444">XAUUSD LIKELY DOWN 🔻</span>`
      : `<span style="color:#22c55e">XAUUSD LIKELY UP 🔺</span>`;
}

run();
</script>
