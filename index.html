<script>

function getData() {
  // This is now your "data input layer"
  // Later we replace this with real APIs

  return {
    nfp: {
      value: 0,
      previous: 0,
      surprise: 0
    },
    cpi: {
      value: 0,
      previous: 0,
      surprise: 0
    }
  };
}

function calculateImpact(value, previous) {
  return value - previous;
}

function scoreNFP(nfp) {
  let surprise = calculateImpact(nfp.value, nfp.previous);

  if (surprise > 20000) return { score: 3, label: "VERY STRONG JOBS" };
  if (surprise > 0) return { score: 2, label: "POSITIVE JOBS" };
  return { score: 1, label: "WEAK JOBS" };
}

function scoreCPI(cpi) {
  let surprise = calculateImpact(cpi.value, cpi.previous);

  if (surprise < 0) return { score: 3, label: "DISINFLATION (USD STRONG)" };
  if (surprise === 0) return { score: 2, label: "STABLE INFLATION" };
  return { score: 1, label: "INFLATION PRESSURE" };
}

function getBias(total) {
  if (total >= 5) return "STRONG USD BULLISH";
  if (total === 4) return "MODERATE USD BULLISH";
  if (total === 3) return "NEUTRAL";
  return "USD BEARISH";
}

function run() {

  const data = getData();

  const nfp = scoreNFP(data.nfp);
  const cpi = scoreCPI(data.cpi);

  const total = nfp.score + cpi.score;

  const bias = getBias(total);

  document.getElementById("status").innerText = "ENGINE READY (INPUT MODE)";

  document.getElementById("nfp").innerHTML =
    nfp.label + " | Score: " + nfp.score;

  document.getElementById("cpi").innerHTML =
    cpi.label + " | Score: " + cpi.score;

  document.getElementById("bias").innerHTML =
    "<b>" + bias + "</b>";

  document.getElementById("gold").innerHTML =
    bias.includes("BULLISH")
      ? "XAUUSD → DOWN 🔻"
      : "XAUUSD → UP 🔺";
}

run();

</script>
