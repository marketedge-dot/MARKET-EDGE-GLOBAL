<script>

function getData() {
  // This is your future real API layer
  return {
    nfp: {
      value: 175000,
      previous: 150000,
      timestamp: "latest"
    },
    cpi: {
      value: 3.1,
      previous: 3.4,
      timestamp: "latest"
    }
  };
}

function validateData(data) {
  // DATA FRESHNESS RULE (VERY IMPORTANT IN REAL SYSTEMS)

  if (!data.nfp.value || !data.cpi.value) {
    return { valid: false, reason: "Missing data" };
  }

  return { valid: true };
}

function scoreNFP(nfp) {
  let change = nfp.value - nfp.previous;

  if (change > 20000) return 7;
  if (change > 0) return 5;
  return 2;
}

function scoreCPI(cpi) {
  let change = cpi.value - cpi.previous;

  if (change < 0) return 7; // disinflation = USD bullish
  if (change === 0) return 5;
  return 2;
}

function getBias(total) {
  if (total >= 12) return "STRONG USD BULLISH";
  if (total >= 9) return "MODERATE USD BULLISH";
  if (total >= 6) return "NEUTRAL";
  return "USD BEARISH";
}

function runEngine() {

  const data = getData();

  const check = validateData(data);

  if (!check.valid) {
    document.getElementById("status").innerText =
      "DATA ERROR: " + check.reason;
    return;
  }

  const nfpScore = scoreNFP(data.nfp);
  const cpiScore = scoreCPI(data.cpi);

  const total = nfpScore + cpiScore;

  const bias = getBias(total);

  document.getElementById("status").innerText = "ENGINE ACTIVE";

  document.getElementById("output").innerHTML =
    "NFP Score: " + nfpScore +
    "<br>CPI Score: " + cpiScore +
    "<br>Total Score: " + total +
    "<br><b>" + bias + "</b>";
}

runEngine();

</script>
