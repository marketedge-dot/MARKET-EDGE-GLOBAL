<script>

async function fetchData() {

  // THIS IS YOUR FUTURE API STRUCTURE
  // We will replace this with real endpoints later

  return {
    nfp: {
      value: 175000,
      previous: 150000,
      surprise: 25000
    },
    cpi: {
      value: 3.1,
      previous: 3.4,
      surprise: -0.3
    }
  };
}

function scoreNFP(nfp) {
  if (nfp.surprise > 20000) return 7;
  if (nfp.surprise > 0) return 5;
  return 2;
}

function scoreCPI(cpi) {
  if (cpi.surprise < 0) return 7; // disinflation = USD bullish
  if (cpi.surprise === 0) return 5;
  return 2;
}

function generateBias(total) {
  if (total >= 12) return "STRONG USD BULLISH";
  if (total >= 9) return "MODERATE USD BULLISH";
  if (total >= 6) return "NEUTRAL";
  return "USD BEARISH";
}

async function run() {

  const data = await fetchData();

  const nfpScore = scoreNFP(data.nfp);
  const cpiScore = scoreCPI(data.cpi);

  const total = nfpScore + cpiScore;

  const bias = generateBias(total);

  document.getElementById("nfp").innerText =
    `NFP: ${data.nfp.value} | Score: ${nfpScore}`;

  document.getElementById("cpi").innerText =
    `CPI: ${data.cpi.value}% | Score: ${cpiScore}`;

  document.getElementById("bias").innerText = bias;

  document.getElementById("gold").innerText =
    bias.includes("BULLISH")
      ? "XAUUSD DOWN 🔻 (USD Strength)"
      : "XAUUSD UP 🔺 (USD Weakness)";
}

run();

</script>
