<script>

// 1. STRUCTURED DATA MODEL (this is how real systems think)
const data = {
  nfp: {
    current: 175000,
    previous: 150000
  },
  cpi: {
    current: 3.1,
    previous: 3.4
  }
};

// 2. CALCULATE REAL ECONOMIC CHANGE (not random scores)
function calculateChange(current, previous) {
  return current - previous;
}

// 3. NFP IMPACT ENGINE
function nfpImpact(nfp) {
  let change = calculateChange(nfp.current, nfp.previous);

  if (change > 20000) return { score: 3, label: "VERY STRONG JOBS" };
  if (change > 0) return { score: 2, label: "STABLE JOBS" };
  return { score: 1, label: "WEAK JOBS" };
}

// 4. CPI IMPACT ENGINE
function cpiImpact(cpi) {
  let change = calculateChange(cpi.current, cpi.previous);

  if (change < 0) return { score: 3, label: "DISINFLATION (USD STRONG)" };
  if (change === 0) return { score: 2, label: "STABLE INFLATION" };
  return { score: 1, label: "INFLATION PRESSURE" };
}

// 5. MARKET BIAS ENGINE (THIS IS YOUR CORE LOGIC)
function getBias(totalScore) {
  if (totalScore >= 5) return "STRONG USD BULLISH";
  if (totalScore === 4) return "MODERATE USD BULLISH";
  if (totalScore === 3) return "NEUTRAL";
  return "USD BEARISH";
}

// 6. RUN ENGINE
function run() {

  const nfp = nfpImpact(data.nfp);
  const cpi = cpiImpact(data.cpi);

  const total = nfp.score + cpi.score;
  const bias = getBias(total);

  // UI OUTPUT
  document.getElementById("status").innerText = "ENGINE ACTIVE";

  document.getElementById("nfp").innerHTML =
    nfp.label + " (Score: " + nfp.score + ")";

  document.getElementById("cpi").innerHTML =
    cpi.label + " (Score: " + cpi.score + ")";

  document.getElementById("bias").innerHTML =
    "<b>" + bias + "</b>";

  document.getElementById("gold").innerHTML =
    bias.includes("BULLISH")
      ? "XAUUSD → DOWN 🔻 (USD STRENGTH)"
      : "XAUUSD → UP 🔺 (USD WEAKNESS)";
}

run();

</script>
