<!DOCTYPE html>
<html>
<head>
  <title>MarketEdge Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    .box {
      background: #1e293b;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }

    .title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .signal {
      font-size: 18px;
      color: #22c55e;
    }
  </style>
</head>

<body>

<div class="title">MarketEdge Dashboard</div>

<div class="box">
  <h3>Market Bias Engine</h3>
  <div id="bias">Loading...</div>
</div>

<div class="box">
  <h3>NFP</h3>
  <div id="nfp">Loading...</div>
</div>

<div class="box">
  <h3>CPI</h3>
  <div id="cpi">Loading...</div>
</div>

<div class="box">
  <h3>XAUUSD Impact</h3>
  <div id="gold">Loading...</div>
</div>

<script>
function run() {

  let nfpScore = 6;
  let cpiScore = 4;

  let total = nfpScore + cpiScore;

  let bias = "NEUTRAL";

  if (total >= 10) bias = "STRONG USD BULLISH";
  else if (total >= 7) bias = "MODERATE USD BULLISH";
  else if (total >= 4) bias = "NEUTRAL";
  else bias = "USD WEAK";

  document.getElementById("nfp").innerText = "Score: " + nfpScore;
  document.getElementById("cpi").innerText = "Score: " + cpiScore;
  document.getElementById("bias").innerText = bias;

  document.getElementById("gold").innerText =
    bias.includes("BULLISH")
      ? "XAUUSD likely DOWN 🔻"
      : "XAUUSD likely UP 🔺";
}

run();
</script>

</body>
</html>
