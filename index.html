<!DOCTYPE html>
<html>
<head>
  <title>MarketEdge Control Center</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .header {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 15px;
      color: #38bdf8;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      border: 1px solid #334155;
    }

    .label {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 5px;
    }

    .value {
      font-size: 18px;
      font-weight: bold;
    }

    .full {
      grid-column: span 2;
    }

    .status {
      color: #22c55e;
    }
  </style>
</head>

<body>

<div class="header">MarketEdge Control Center</div>

<div class="grid">

  <div class="card full">
    <div class="label">System Status</div>
    <div class="value status" id="status">Loading...</div>
  </div>

  <div class="card">
    <div class="label">NFP Analysis</div>
    <div class="value" id="nfp">...</div>
  </div>

  <div class="card">
    <div class="label">CPI Analysis</div>
    <div class="value" id="cpi">...</div>
  </div>

  <div class="card full">
    <div class="label">Market Bias</div>
    <div class="value" id="bias">...</div>
  </div>

  <div class="card full">
    <div class="label">XAUUSD Reaction Model</div>
    <div class="value" id="gold">...</div>
  </div>

</div>

<script src="engine.js"></script>

</body>
</html>
