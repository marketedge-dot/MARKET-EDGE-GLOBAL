<script>

function getMockData() {
  return {
    nfp: {
      value: 175000,
      previous: 150000
    },
    cpi: {
      value: 3.1,
      previous: 3.4
    }
  };
}

function calculateNFP(nfp) {
  let diff = nfp.value - nfp.previous;

  if (diff > 20000) return 7;
  if (diff > 0) return 5;
  return 2;
}

function calculateCPI(cpi) {
  let diff = cpi.value - cpi.previous;

  if (diff < 0) return 7; // disinflation = USD bullish
  if (diff === 0) return 5;
  return 2;
}

function getBias(score) {
  if (score >= 12) return "STRONG USD BULLISH";
  if (score >= 9) return "MODERATE USD BULLISH";
  if (score >= 6) return "NEUTRAL";
  return "USD BEARISH";
}

function runEngine() {

  const data = getMockData();

  const nfpScore = calculateNFP(data.nfp);
  const cpiScore = calculateCPI(data.cpi);

  const total = nfpScore + cpiScore;

  const bias = getBias(total);

  document.getElementById("status").innerText = "ENGINE ACTIVE";

  document.getElementById("test").innerHTML =
    "NFP Score: " + nfpScore +
    "<br>CPI Score: " + cpiScore +
    "<br>Total: " + total +
    "<br><b>" + bias + "</b>";
}

runEngine();

</script>
