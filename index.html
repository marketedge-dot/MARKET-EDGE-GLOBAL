<!DOCTYPE html>
<html>
<head>
  <title>MarketEdge Safe Mode</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .box {
      background: #1e293b;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }

    .title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .green { color: #22c55e; }
    .red { color: #ef4444; }
    .amber { color: #f59e0b; }
  </style>
</head>

<body>

<div class="title">MarketEdge SAFE MODE</div>

<div class="box">
  <p id="status">Loading system...</p>
</div>

<div class="box">
  <p id="nfp">NFP loading...</p>
  <p id="cpi">CPI loading...</p>
</div>

<div class="box">
  <p id="bias">Bias loading...</p>
</div>

<div class="box">
  <p id="gold">Gold impact loading...</p>
</div>

<script>
try {

  // SIMPLE SAFE DATA
  let nfpCurrent = 175000;
  let nfpPrevious = 150000;

  let cpiCurrent = 3.1;
  let cpiPrevious = 3.4;

  let nfpChange = nfpCurrent - nfpPrevious;
  let cpiChange = cpiCurrent - cpiPrevious;

  let nfpScore = nfpChange > 0 ? 2 : 1;
  let cpiScore = cpiChange < 0 ? 2 : 1;

  let total = nfpScore + cpiScore;

  let bias = "NEUTRAL";

  if (total >= 4) bias = "STRONG USD BULLISH";
  else if (total === 3) bias = "MODERATE USD BULLISH";
  else bias = "USD WEAK";

  document.getElementById("status").innerText = "SYSTEM RUNNING OK";

  document.getElementById("nfp").innerText = "NFP Score: " + nfpScore;
  document.getElementById("cpi").innerText = "CPI Score: " + cpiScore;

  document.getElementById("bias").innerHTML = "<b>" + bias + "</b>";

  document.getElementById("gold").innerText =
    bias.includes("BULLISH")
      ? "XAUUSD → DOWN 🔻"
      : "XAUUSD → UP 🔺";

} catch (e) {
  document.body.innerHTML =
    "<h2 style='color:red'>ERROR:</h2><pre>" + e.message + "</pre>";
}
</script>

</body>
</html>
