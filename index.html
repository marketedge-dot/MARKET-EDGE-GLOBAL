<!DOCTYPE html>
<html>
<head>
  <title>MarketEdge</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .box {
      background: #1e293b;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }

    .title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .ok {
      color: #22c55e;
    }
  </style>
</head>

<body>

<div class="title">MarketEdge Dashboard</div>

<div class="box">
  <h3>Status</h3>
  <p id="status">Loading...</p>
</div>

<div class="box">
  <h3>Engine Output</h3>
  <p id="output">Waiting...</p>
</div>

<script>
try {
  document.getElementById("status").innerText = "SYSTEM OK";

  let nfp = 6;
  let cpi = 4;
  let total = nfp + cpi;

  let bias = "NEUTRAL";

  if (total >= 10) bias = "STRONG USD BULLISH";
  else if (total >= 7) bias = "MODERATE USD BULLISH";
  else if (total >= 4) bias = "NEUTRAL";
  else bias = "USD BEARISH";

  document.getElementById("output").innerHTML =
    "NFP: " + nfp +
    "<br>CPI: " + cpi +
    "<br>Total: " + total +
    "<br><b>" + bias + "</b>";

} catch (error) {
  document.getElementById("status").innerText = "ERROR: " + error.message;
}
</script>

</body>
</html>
