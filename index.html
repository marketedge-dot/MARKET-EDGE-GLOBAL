<!DOCTYPE html>
<html>
<head>
  <title>MarketEdge Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .title {
      font-size: 26px;
      font-weight: bold;
      background: linear-gradient(90deg,#22c55e,#38bdf8,#a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .box {
      background: #1e293b;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #334155;
    }

    .label {
      color: #94a3b8;
      font-size: 13px;
    }

    .value {
      font-size: 18px;
      font-weight: bold;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<div class="title">MarketEdge Dashboard</div>

<div class="box">
  <div class="label">System Status</div>
  <div class="value" id="status">Loading...</div>
</div>

<div class="box">
  <div class="label">NFP Signal</div>
  <div class="value" id="nfp">...</div>
</div>

<div class="box">
  <div class="label">CPI Signal</div>
  <div class="value" id="cpi">...</div>
</div>

<div class="box">
  <div class="label">Market Bias</div>
  <div class="value" id="bias">...</div>
</div>

<div class="box">
  <div class="label">XAUUSD Impact</div>
  <div class="value" id="gold">...</div>
</div>

<!-- IMPORTANT: external engine -->
<script src="engine.js"></script>

</body>
</html>
