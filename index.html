<script>
async function getMockEconomicData() {
  // IMPORTANT: This simulates real API structure first
  // Later we replace with real endpoints (FRED/BLS)

  return {
    nfp: {
      value: 175000,
      previous: 150000,
      trend: "UP"
    },
    cpi: {
      value: 3.1,
      previous: 3.4,
      trend: "DOWN"
    }
  };
}

function calculateScore(data) {
  let nfpScore = 0;
  let cpiScore = 0;

  // NFP logic
  if (data.nfp.value > data.nfp.previous) nfpScore = 6;
  else nfpScore = 3;

  // CPI logic
  if (data.cpi.value < data.cpi.previous) cpiScore = 6;
  else cpiScore = 3;

  return { nfpScore, cpiScore };
}

function generateBias(total) {
  if (total >= 10) return "STRONG USD BULLISH";
  if (total >= 7) return "MODERATE USD BULLISH";
  if (total >= 4) return "NEUTRAL";
  return "USD BEARISH";
}

async function runEngine() {
  const data = await getMockEconomicData();

  const scores = calculateScore(data);
  const total = scores.nfpScore + scores.cpiScore;

  const bias = generateBias(total);

  document.getElementById("nfp").innerText =
    "NFP: " + data.nfp.value + " (Score " + scores.nfpScore + ")";

  document.getElementById("cpi").innerText =
    "CPI: " + data.cpi.value + "% (Score " + scores.cpiScore + ")";

  document.getElementById("bias").innerText = bias;

  document.getElementById("gold").innerText =
    bias.includes("BULLISH")
      ? "XAUUSD likely DOWN 🔻"
      : "XAUUSD likely UP 🔺";
}

runEngine();
</script>
